spring.application.name=gateway
server.port = 9000

spring.cloud.gateway.server.webflux.routes[0].id=order-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ECOM-ORDER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/order/**

spring.cloud.gateway.server.webflux.routes[1].id=inventory-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ECOM-INVENTORY-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/inventory/**